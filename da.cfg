# ld65 configuration for a desk accessory (.CXD): a PRG that loads at
# $A000 and runs there, in bank 9, under the DA manager (kernel/ui/da.asm).
# One bank is the whole world: code, data, and the header at $A000.

MEMORY {
    HDR:  start = $9FFE, size = $0002, file = %O;
    MAIN: start = $A000, size = $2000, file = %O;
}

SEGMENTS {
    LOADADDR: load = HDR,  type = ro;
    CODE:     load = MAIN, type = rw;
}
