# ld65 configuration for the CXGEOS cartridge image (kernel/boot/cart.asm).
#
# Five 16 KB cartridge ROM banks, all written to one raw output file that
# x16emu -cartbin loads starting at ROM bank 32:
#
#   bank 32  the "CX16" signature at $C000, the boot stub, the relocated
#            copier, then the resident image and the font as data
#   bank 33  first 16 KB of CXBANKS.BIN
#   bank 34  second 16 KB of CXBANKS.BIN
#   bank 35  first 16 KB of CXBANKS2.BIN
#   bank 36  second 16 KB of CXBANKS2.BIN
#
# The KERNAL scans bank 32 $C000 for "CX16" and jumps to $C004, so SIG
# must land first and FRONT immediately after it. CONT loads into bank 32
# but RUNs from low RAM ($0400) -- the documented load != run pattern,
# same as the engine images in kernel.cfg -- so it can page ROM_BANK.

MEMORY {
    # run address for the relocated copier; not emitted to the image
    LOWRAM:  start = $0400, size = $0400, type = rw,             file = "";

    # the five cartridge banks, in output order -> cxgeos_cart.bin
    B32:     start = $C000, size = $4000, fill = yes,            file = %O;
    B33:     start = $C000, size = $4000, fill = yes,            file = %O;
    B34:     start = $C000, size = $4000, fill = yes,            file = %O;
    B35:     start = $C000, size = $4000, fill = yes,            file = %O;
    B36:     start = $C000, size = $4000, fill = yes,            file = %O;
}

SEGMENTS {
    SIG:      load = B32,               type = ro;              # "CX16" @ $C000
    FRONT:    load = B32,               type = ro;              # stub @ $C004
    CONT:     load = B32, run = LOWRAM,  type = rw, define = yes; # -> $0400
    RESIMG:   load = B32,               type = ro, define = yes, align = $100;
    FONTIMG:  load = B32,               type = ro, define = yes, align = $100;
    BANKS_LO:  load = B33,              type = ro;              # CXBANKS 0..16K
    BANKS_HI:  load = B34,              type = ro;              # CXBANKS 16K..32K
    BANKS2_LO: load = B35,              type = ro;              # CXBANKS2 0..16K
    BANKS2_HI: load = B36,              type = ro;              # CXBANKS2 16K..32K
}
