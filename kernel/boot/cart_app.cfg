# ld65 config for a STANDALONE CXRF cartridge (kernel/boot/cart.asm with
# -D CART_APP): the framework AND one app baked into ROM, so the cartridge
# boots the app with no SD card at all. Same as cart.cfg plus a sixth ROM
# bank (37) holding the app's CXA image (build/CARTAPP.CXA).
#
#   bank 32  "CX16" + boot stub + copier + resident image + font
#   bank 33  first 16 KB of CXBANKS.BIN
#   bank 34  second 16 KB of CXBANKS.BIN
#   bank 35  first 16 KB of CXBANKS2.BIN
#   bank 36  second 16 KB of CXBANKS2.BIN
#   bank 37  the app's CXA (32-byte CXAP header + PRG); the stub copies its
#            payload to $0801 and jumps the entry. Max one bank (~16 KB CXA).

MEMORY {
    LOWRAM:  start = $0400, size = $0400, type = rw,             file = "";

    B32:     start = $C000, size = $4000, fill = yes,            file = %O;
    B33:     start = $C000, size = $4000, fill = yes,            file = %O;
    B34:     start = $C000, size = $4000, fill = yes,            file = %O;
    B35:     start = $C000, size = $4000, fill = yes,            file = %O;
    B36:     start = $C000, size = $4000, fill = yes,            file = %O;
    B37:     start = $C000, size = $4000, fill = yes,            file = %O;
}

SEGMENTS {
    SIG:      load = B32,               type = ro;
    FRONT:    load = B32,               type = ro;
    CONT:     load = B32, run = LOWRAM,  type = rw, define = yes;
    RESIMG:   load = B32,               type = ro, define = yes, align = $100;
    FONTIMG:  load = B32,               type = ro, define = yes, align = $100;
    BANKS_LO:  load = B33,              type = ro;
    BANKS_HI:  load = B34,              type = ro;
    BANKS2_LO: load = B35,              type = ro;
    BANKS2_HI: load = B36,              type = ro;
    APPIMG:    load = B37,              type = ro, define = yes;   # build/CARTAPP.CXA
}
