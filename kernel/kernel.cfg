# ld65 configuration for the CXGEOS kernel image.
#
# The kernel is a PRG that loads at $8000 and stays there. Its layout is
# not a preference -- three of these four addresses are promises:
#
#   $8000  the header a loader reads: "CXOS", version, slots, init
#   $8010  the jump table: slot n at $8010 + n*3, forever
#   $8160  the resident code, up to OVL at $9600 (5,280 bytes)
#   $9F00  I/O begins; past here is not memory
#
# Only $8000, $8010 and $9F00 are external promises -- an app reaches
# the kernel through the table alone. Where the resident code starts is
# ours to set: it trades jump-table growth room against code room.
#
# An app owns $0801-$7FFF and never links kernel code, so the only thing
# it needs to agree with is the table -- which is why the table's address
# is fixed here and generated from abi/cxgeos.abi at the other end.
#
# JHDR and JTAB are filled: a PRG is one contiguous run from its load
# address, so a hole between the table and the code would put the code
# at the wrong address. The fill is what makes $8160 mean $8160.
#
# RESIDENT is NOT filled -- the image ends where the code ends. ld65
# fails the build if it overflows, which is the budget enforcing itself.
#
# BANK2 is the second output file: CXBANKS.BIN, the kernel's banked
# code (docs/ui.md). Same translation unit, so bank code and resident
# code name each other's labels freely; the linker just puts the bytes
# in a different file, addressed for the $A000 window. Boot loads it
# raw into bank 2. When bank 3 exists it appends here and the one LOAD
# keeps working -- the KERNAL wraps banked loads at $BFFF on its own.

# OVL is the graphics port: a fixed resident region whose first bytes
# are the engine entry vector the gfx ABI slots target forever. It has
# NO file -- its content arrives at runtime, copied from a bank by
# cx_ov_boot (and, later, cx_gfx_mode). Engine images are overlay
# segments (run = OVL, load = a bank), the documented ld65 pattern.
# OVL's start must equal CX_OVL in kernel/video/ovl.inc.
#
# BANK2 is filled so bank 3's image starts on the $2000 boundary; the
# boot LOAD still reads CXBANKS.BIN in one call (the KERNAL wraps
# banked loads at $BFFF on its own).

MEMORY {
    HDR:      start = $7FFF, size = $0002,             file = %O;
    JHDR:     start = $8000, size = $0010, fill = yes, file = %O;
    # JTAB reserves room for the jump table to grow. At 95 slots it uses
    # $8010-$812C; the reserve caps at 135 slots ($8010-$81A4), leaving
    # 40 of headroom and handing the resident code the bytes below.
    # (P5's resident diet -- the font cold half to bank 18 -- freed the
    # room to widen this from 110; only $8000/$8010/$9F00 are external
    # promises, so where the reserve ends is ours to move.)
    JTAB:     start = $8010, size = $0195, fill = yes, file = %O;
    # KB is the kernel build word (banks.inc CX_KBUILD): the reserve's
    # last four bytes, at the FIXED $81A5. Stage-0 compares it against
    # the banked files' signatures so a mixed-generation SD card refuses
    # at boot instead of crashing in a far call.
    KB:       start = $81A5, size = $0004, fill = yes, file = %O;
    RESIDENT: start = $81A9, size = $1457,             file = %O;
    OVL:      start = $9600, size = $0900,             file = "";
    OVL1:     start = $9600, size = $0900,             file = "";
    OVL2:     start = $9600, size = $0900,             file = "";
    OVL3:     start = $9600, size = $0900,             file = "";
    OVL4:     start = $9600, size = $0900,             file = "";
    BANK2:    start = $A000, size = $2000, fill = yes, file = "build/CXBANKS.BIN";
    BANK3:    start = $A000, size = $2000, fill = yes, file = "build/CXBANKS.BIN";
    BANK4:    start = $A000, size = $2000, fill = yes, file = "build/CXBANKS.BIN";
    BANK5:    start = $A000, size = $2000, fill = yes, file = "build/CXBANKS.BIN";
    # The second banked-code file: one theme per bank (banks.inc), each
    # bank opening with its 8-byte signature. Loaded by stage-0's second
    # LOAD (SD) or the cartridge's second copy pass (ROM banks 35-36).
    BANK16:   start = $A000, size = $2000, fill = yes, file = "build/CXBANKS2.BIN";
    BANK17:   start = $A000, size = $2000, fill = yes, file = "build/CXBANKS2.BIN";
    BANK18:   start = $A000, size = $2000, fill = yes, file = "build/CXBANKS2.BIN";
    BANK19:   start = $A000, size = $2000, fill = yes, file = "build/CXBANKS2.BIN";
}

SEGMENTS {
    LOADADDR: load = HDR,      type = ro;
    JUMPHDR:  load = JHDR,     type = ro;
    JUMPTAB:  load = JTAB,     type = ro;
    KBUILD:   load = KB,       type = ro;
    CODE:     load = RESIDENT, type = rw;
    RODATA:   load = RESIDENT, type = ro,  optional = yes;
    DATA:     load = RESIDENT, type = rw,  optional = yes;
    BSS:      load = RESIDENT, type = bss, optional = yes;
    B2CODE:   load = BANK2,    type = rw,  optional = yes, define = yes;
    OV0CODE:  load = BANK3,    run = OVL,  type = rw,  optional = yes;
    OV1CODE:  load = BANK4,    run = OVL1, type = rw,  optional = yes;
    B5CODE:   load = BANK5,    type = rw,  optional = yes, define = yes;
    OV2CODE:  load = BANK5,    run = OVL2, type = rw,  optional = yes, define = yes;
    OV3CODE:  load = BANK5,    run = OVL3, type = rw,  optional = yes, define = yes;
    OV3TCODE: load = BANK5,    run = OVL4, type = rw,  optional = yes, define = yes;
    # each new bank opens with its signature, then its code
    B16SIG:   load = BANK16,   type = ro,  optional = yes;
    B16CODE:  load = BANK16,   type = rw,  optional = yes, define = yes;
    B17SIG:   load = BANK17,   type = ro,  optional = yes;
    B17CODE:  load = BANK17,   type = rw,  optional = yes, define = yes;
    B18SIG:   load = BANK18,   type = ro,  optional = yes;
    B18CODE:  load = BANK18,   type = rw,  optional = yes, define = yes;
    B19SIG:   load = BANK19,   type = ro,  optional = yes;
    B19CODE:  load = BANK19,   type = rw,  optional = yes, define = yes;
}
