# ld65 configuration for the CXGEOS kernel image.
#
# The kernel is a PRG that loads at $8000 and stays there. Its layout is
# not a preference -- three of these four addresses are promises:
#
#   $8000  the header a loader reads: "CXOS", version, slots, init
#   $8010  the jump table: slot n at $8010 + n*3, forever
#   $8200  the resident code, 7,424 bytes and not a byte more
#   $9F00  I/O begins; past here is not memory
#
# An app owns $0801-$7FFF and never links kernel code, so the only thing
# it needs to agree with is the table -- which is why the table's address
# is fixed here and generated from abi/cxgeos.abi at the other end.
#
# JHDR and JTAB are filled: a PRG is one contiguous run from its load
# address, so a hole between the table and the code would put the code
# at the wrong address. The fill is what makes $8200 mean $8200.
#
# RESIDENT is NOT filled -- the image ends where the code ends. ld65
# fails the build if it overflows, which is the budget enforcing itself.
#
# BANK2 is the second output file: CXBANKS.BIN, the kernel's banked
# code (docs/ui.md). Same translation unit, so bank code and resident
# code name each other's labels freely; the linker just puts the bytes
# in a different file, addressed for the $A000 window. Boot loads it
# raw into bank 2. When bank 3 exists it appends here and the one LOAD
# keeps working -- the KERNAL wraps banked loads at $BFFF on its own.

# OVL is the graphics port: a fixed resident region whose first bytes
# are the engine entry vector the gfx ABI slots target forever. It has
# NO file -- its content arrives at runtime, copied from a bank by
# cx_ov_boot (and, later, cx_gfx_mode). Engine images are overlay
# segments (run = OVL, load = a bank), the documented ld65 pattern.
# OVL's start must equal CX_OVL in kernel/video/ovl.inc.
#
# BANK2 is filled so bank 3's image starts on the $2000 boundary; the
# boot LOAD still reads CXBANKS.BIN in one call (the KERNAL wraps
# banked loads at $BFFF on its own).

MEMORY {
    HDR:      start = $7FFF, size = $0002,             file = %O;
    JHDR:     start = $8000, size = $0010, fill = yes, file = %O;
    JTAB:     start = $8010, size = $01F0, fill = yes, file = %O;
    RESIDENT: start = $8200, size = $1300,             file = %O;
    OVL:      start = $9500, size = $0A00,             file = "";
    OVL1:     start = $9500, size = $0A00,             file = "";
    BANK2:    start = $A000, size = $2000, fill = yes, file = "build/CXBANKS.BIN";
    BANK3:    start = $A000, size = $2000, fill = yes, file = "build/CXBANKS.BIN";
    BANK4:    start = $A000, size = $2000,             file = "build/CXBANKS.BIN";
}

SEGMENTS {
    LOADADDR: load = HDR,      type = ro;
    JUMPHDR:  load = JHDR,     type = ro;
    JUMPTAB:  load = JTAB,     type = ro;
    CODE:     load = RESIDENT, type = rw;
    RODATA:   load = RESIDENT, type = ro,  optional = yes;
    DATA:     load = RESIDENT, type = rw,  optional = yes;
    BSS:      load = RESIDENT, type = bss, optional = yes;
    B2CODE:   load = BANK2,    type = rw,  optional = yes;
    OV0CODE:  load = BANK3,    run = OVL,  type = rw,  optional = yes;
    OV1CODE:  load = BANK4,    run = OVL1, type = rw,  optional = yes;
}
