# ld65 configuration for a plain X16 PRG (spikes, tests, simple apps).
# LOADADDR carries the 2-byte load address, CODE holds everything else --
# one translation unit, code and data interleaved (the x16lib shape).

MEMORY {
    HDR:  start = $07FF, size = $0002, file = %O;
    MAIN: start = $0801, size = $9700, file = %O;
}

SEGMENTS {
    LOADADDR: load = HDR,  type = ro;
    CODE:     load = MAIN, type = rw;

    # The ABI header and jump table. In a real kernel image these are
    # pinned at $8000/$8010 by kernel.cfg -- the addresses are a promise
    # to every app ever built. Here they just land in MAIN with everything
    # else, so a test can assemble the table, prove every slot resolves to
    # a routine, and call through it. What that cannot check is the
    # placement; kernel.cfg's own build does.
    JUMPHDR:  load = MAIN, type = ro, optional = yes;
    JUMPTAB:  load = MAIN, type = ro, optional = yes;

    # Banked kernel code, when a test links kernel sources that carry
    # it. Here it lands in MAIN with everything else -- the flat build
    # has no banking, so the runner calls it by label at its MAIN
    # address; only kernel.cfg gives each segment its real $A000 home.
    # define = yes because the bank signatures (banksig.asm, menu.asm)
    # quote each segment's size and must resolve here too.
    B2CODE:   load = MAIN, type = rw, optional = yes, define = yes;
    B5CODE:   load = MAIN, type = rw, optional = yes, define = yes;
    B16SIG:   load = MAIN, type = ro, optional = yes;
    B16CODE:  load = MAIN, type = rw, optional = yes, define = yes;
    B17SIG:   load = MAIN, type = ro, optional = yes;
    B17CODE:  load = MAIN, type = rw, optional = yes, define = yes;
    B18SIG:   load = MAIN, type = ro, optional = yes;
    B18CODE:  load = MAIN, type = rw, optional = yes, define = yes;
    B19SIG:   load = MAIN, type = ro, optional = yes;
    B19CODE:  load = MAIN, type = rw, optional = yes, define = yes;
    KBUILD:   load = MAIN, type = ro, optional = yes;
}
